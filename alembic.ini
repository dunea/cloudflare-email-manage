# Alembic configuration file.
# NOTE: kept ASCII-only because Alembic reads this file using the system
# locale encoding (e.g. GBK on zh-CN Windows), which breaks on non-ASCII bytes.

[alembic]
# Migration scripts directory.
script_location = alembic

# Add the project root to sys.path so the `app` package is importable.
prepend_sys_path = .

# Migration filename template (timestamp-prefixed for ordering).
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for migration timestamps.
timezone = UTC

# Placeholder DB URL; the real value is loaded from app.config.settings in env.py.
sqlalchemy.url = sqlite+aiosqlite:///./cf_email.db


[post_write_hooks]
# Optional formatting hooks after generating a migration; disabled for now.


# Logging configuration.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
