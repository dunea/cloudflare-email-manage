{% extends "base.html" %}
{% block title %}页面不存在 · {{ app_name }}{% endblock %}
{% block content %}
<div class="rounded-2xl border border-slate-200 bg-white p-8 text-center shadow-sm">
  <div class="text-5xl">🔍</div>
  <h1 class="mt-4 text-xl font-semibold text-slate-900">页面不存在</h1>
  <p class="mt-2 text-sm text-slate-500">{{ error_message | default("你访问的页面不存在或已被移动。") }}</p>
  <a href="/dashboard"
     class="mt-6 inline-block rounded-lg bg-brand px-4 py-2 text-sm font-semibold text-white hover:bg-brand-dark">返回仪表盘</a>
</div>
{% endblock %}
