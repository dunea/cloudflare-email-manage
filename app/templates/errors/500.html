{% extends "base.html" %}
{% block title %}出错了 · {{ app_name }}{% endblock %}
{% block content %}
<div class="rounded-2xl border border-slate-200 bg-white p-8 text-center shadow-sm">
  <div class="text-5xl">⚠️</div>
  <h1 class="mt-4 text-xl font-semibold text-slate-900">服务器出错了</h1>
  <p class="mt-2 text-sm text-slate-500">{{ error_message | default("请稍后重试，或联系管理员。") }}</p>
  <a href="/dashboard"
     class="mt-6 inline-block rounded-lg bg-brand px-4 py-2 text-sm font-semibold text-white hover:bg-brand-dark">返回仪表盘</a>
</div>
{% endblock %}
