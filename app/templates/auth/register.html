{% extends "base.html" %}
{% block title %}注册 · {{ app_name }}{% endblock %}
{% block content %}
<div class="rounded-2xl border border-slate-200 bg-white p-8 shadow-sm">
  <h1 class="mb-1 text-2xl font-semibold text-slate-900">注册</h1>
  <p class="mb-6 text-sm text-slate-500">创建账号以使用 {{ app_name }}</p>

  <form method="post" action="/register" class="space-y-4" x-data="{ show: false }">
    <div>
      <label class="mb-1 block text-sm font-medium text-slate-700">用户名</label>
      <input name="username" value="{{ form.username | default('') }}" required autofocus
             minlength="3" maxlength="64"
             class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-brand focus:outline-none focus:ring-2 focus:ring-brand/30" />
      <p class="mt-1 text-xs text-slate-400">3–64 个字符</p>
    </div>
    <div>
      <label class="mb-1 block text-sm font-medium text-slate-700">邮箱</label>
      <input name="email" type="email" value="{{ form.email | default('') }}" required
             class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-brand focus:outline-none focus:ring-2 focus:ring-brand/30" />
    </div>
    <div>
      <label class="mb-1 block text-sm font-medium text-slate-700">密码</label>
      <div class="relative">
        <input name="password" :type="show ? 'text' : 'password'" required
               minlength="8" maxlength="128"
               class="w-full rounded-lg border border-slate-300 px-3 py-2 pr-14 text-sm focus:border-brand focus:outline-none focus:ring-2 focus:ring-brand/30" />
        <button type="button" tabindex="-1" @click="show = !show"
                class="absolute inset-y-0 right-0 px-3 text-xs text-slate-400 hover:text-slate-600"
                x-text="show ? '隐藏' : '显示'"></button>
      </div>
      <p class="mt-1 text-xs text-slate-400">至少 8 个字符</p>
    </div>
    <button type="submit"
            class="w-full rounded-lg bg-brand px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-brand-dark">注册</button>
  </form>

  <p class="mt-6 text-center text-sm text-slate-500">
    已有账号？<a href="/login" class="font-medium text-brand hover:underline">前往登录</a>
  </p>
</div>
{% endblock %}
