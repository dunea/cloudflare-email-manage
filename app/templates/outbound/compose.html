{% extends "base.html" %}
{% block title %}发件 · {{ app_name }}{% endblock %}
{% block content %}
<div class="mb-6">
  <h1 class="text-2xl font-semibold text-slate-900">发件</h1>
  <p class="mt-1 text-sm text-slate-500">通过 Cloudflare Email Sending（Beta）从你的受管邮箱地址发送</p>
</div>

<div class="mb-4 rounded-xl border border-sky-200 bg-sky-50 px-4 py-3 text-sm text-sky-800">
  注意：CF Email Sending 目前为 <strong>Beta</strong>，免费额度约 <strong>1000 封/天</strong>。
</div>

{% if senders %}
<form method="post" action="/outbound" class="max-w-2xl space-y-4 rounded-xl border border-slate-200 bg-white p-6 shadow-sm">
  <div>
    <label class="mb-1 block text-sm font-medium text-slate-700">发件人</label>
    <select name="from_address" required
            class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-brand focus:outline-none focus:ring-2 focus:ring-brand/30">
      {% for s in senders %}
      <option value="{{ s.full_address }}" {% if form.from_address == s.full_address %}selected{% endif %}>{{ s.full_address }}</option>
      {% endfor %}
    </select>
  </div>
  <div>
    <label class="mb-1 block text-sm font-medium text-slate-700">收件人</label>
    <textarea name="to" rows="2" required placeholder="多个收件人用逗号、分号或换行分隔"
              class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-brand focus:outline-none focus:ring-2 focus:ring-brand/30">{{ form.to | default('') }}</textarea>
  </div>
  <div>
    <label class="mb-1 block text-sm font-medium text-slate-700">主题</label>
    <input name="subject" required maxlength="998" value="{{ form.subject | default('') }}"
           class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-brand focus:outline-none focus:ring-2 focus:ring-brand/30" />
  </div>
  <div>
    <label class="mb-1 block text-sm font-medium text-slate-700">纯文本正文</label>
    <textarea name="text" rows="6"
              class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-brand focus:outline-none focus:ring-2 focus:ring-brand/30">{{ form.text | default('') }}</textarea>
  </div>
  <div>
    <label class="mb-1 block text-sm font-medium text-slate-700">HTML 正文（可选）</label>
    <textarea name="html" rows="4"
              class="w-full rounded-lg border border-slate-300 px-3 py-2 font-mono text-sm focus:border-brand focus:outline-none focus:ring-2 focus:ring-brand/30">{{ form.html | default('') }}</textarea>
    <p class="mt-1 text-xs text-slate-400">纯文本与 HTML 至少填写一个。</p>
  </div>
  <button type="submit" class="rounded-lg bg-brand px-5 py-2.5 text-sm font-semibold text-white hover:bg-brand-dark">发送邮件</button>
</form>
{% else %}
<div class="rounded-xl border border-amber-200 bg-amber-50 px-4 py-3 text-sm text-amber-800">
  没有可用的发件地址。请先在「邮箱地址」创建并启用一个邮箱地址。
</div>
{% endif %}
{% endblock %}
